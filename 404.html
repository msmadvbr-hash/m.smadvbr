<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada · M&SM Advocacia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --creme: #F5EFE4; --bege: #E8D9C0; --bege-medio: #D4BC96;
    --caramelo: #B8914A; --dourado: #C9993A; --dourado-escuro: #9A7230;
    --marrom: #5C3D1A; --marrom-escuro: #3A2008;
    --texto: #3A2810; --texto-suave: #6B4F2A; --branco: #FDFAF5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--marrom-escuro);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }

  /* Padrão de fundo */
  body::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9993A' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }

  /* Grande "404" decorativo ao fundo */
  body::after {
    content: '404';
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18rem, 35vw, 32rem);
    font-weight: 300;
    color: rgba(201,153,58,.04);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    user-select: none;
    letter-spacing: -.02em;
    line-height: 1;
    white-space: nowrap;
  }

  .container {
    position: relative; z-index: 2;
    text-align: center;
    padding: 2rem;
    max-width: 520px;
  }

  /* Logo */
  .logo {
    margin-bottom: 3rem;
    display: flex; flex-direction: column; align-items: center; gap: .7rem;
  }
  .logo-v {
    width: 48px; height: 48px;
    border: 1.5px solid rgba(201,153,58,.5);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: .95rem; font-weight: 600;
    color: var(--caramelo); letter-spacing: .05em;
  }
  .logo-name {
    font-family: 'Cinzel', serif; font-size: .65rem;
    letter-spacing: .22em; color: var(--bege-medio);
    text-transform: uppercase; opacity: .7;
  }

  /* Divisor dourado */
  .ornament {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 2.5rem;
  }
  .ornament::before, .ornament::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, rgba(201,153,58,.4));
  }
  .ornament::after { background: linear-gradient(to left, transparent, rgba(201,153,58,.4)); }
  .diamond {
    width: 7px; height: 7px;
    background: var(--caramelo); transform: rotate(45deg); flex-shrink: 0;
    opacity: .7;
  }

  /* Número 404 visível */
  .code {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(4rem, 12vw, 7rem);
    font-weight: 300; line-height: 1;
    color: var(--caramelo);
    letter-spacing: .05em;
    margin-bottom: .5rem;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.3rem, 3vw, 1.9rem);
    font-weight: 300;
    color: var(--bege);
    margin-bottom: 1rem;
    line-height: 1.3;
  }
  .title em { font-style: italic; color: var(--dourado-claro, #E8C060); }

  .desc {
    font-size: .9rem; color: rgba(232,217,192,.55);
    line-height: 1.75; font-weight: 300;
    margin-bottom: 2.5rem;
  }

  /* Botões */
  .actions {
    display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
  }
  .btn-primary {
    font-family: 'Cinzel', serif; font-size: .68rem;
    letter-spacing: .15em; text-transform: uppercase;
    background: var(--caramelo); color: var(--branco);
    border: none; cursor: pointer; text-decoration: none;
    padding: 13px 28px;
    transition: background .25s, transform .2s;
    display: inline-block;
  }
  .btn-primary:hover { background: var(--dourado-escuro); transform: translateY(-2px); }

  .btn-secondary {
    font-family: 'Cinzel', serif; font-size: .68rem;
    letter-spacing: .15em; text-transform: uppercase;
    background: transparent;
    color: rgba(201,153,58,.7);
    border: 1px solid rgba(201,153,58,.3);
    cursor: pointer; text-decoration: none;
    padding: 13px 28px;
    transition: all .25s;
    display: inline-block;
  }
  .btn-secondary:hover {
    background: rgba(201,153,58,.08);
    color: var(--caramelo);
    border-color: rgba(201,153,58,.6);
    transform: translateY(-2px);
  }

  /* URL que tentou acessar */
  .url-info {
    margin-top: 2.5rem;
    font-size: .75rem;
    color: rgba(232,217,192,.25);
    font-family: monospace;
    letter-spacing: .03em;
    word-break: break-all;
  }
</style>
</head>
<body>

<div class="container">

  <div class="logo">
    <div class="logo-v">M&amp;SM</div>
    <span class="logo-name">Monteiro &amp; Solos do Mar</span>
  </div>

  <div class="ornament"><div class="diamond"></div></div>

  <div class="code">404</div>

  <h1 class="title">Página <em>não encontrada</em></h1>

  <p class="desc">
    O endereço que você tentou acessar não existe<br>
    ou foi movido para outro local.
  </p>

  <div class="actions">
    <a href="/m.smadvbr/index.html" class="btn-primary">Ir para o login</a>
    <a href="javascript:history.back()" class="btn-secondary">← Voltar</a>
  </div>

  <div class="url-info" id="url-info"></div>

</div>

<script>
  // Mostra a URL que causou o 404
  const info = document.getElementById('url-info');
  if (info) info.textContent = window.location.href;
</script>
</body>
</html>
