<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3A2008">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="M&SM Adv">
<title>Acesso Restrito · M&SM Advocacia</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/x-icon" href="icons/favicon.ico">
<link rel="shortcut icon" type="image/x-icon" href="icons/favicon.ico">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg-main: #0a0b0d;
    --bg-card: rgba(17, 18, 22, 0.75);
    --border: rgba(197, 168, 128, 0.15);
    --border-focus: #c5a880;
    --accent: #c5a880; /* Champagne Gold / Bronze */
    --accent-hover: #bba078;
    --text-primary: #faf8f5; /* Warm Ivory */
    --text-secondary: #9c9485; /* Warm Bronze-Gray */
    --text-muted: #6b6355;
    --white: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: radial-gradient(circle at center, #1c1d22 0%, #0a0b0d 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    color: var(--text-primary);
  }
  body::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(rgba(197, 168, 128, 0.1) 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.25;
    pointer-events: none;
  }
  .login-card {
    background: var(--bg-card);
    backdrop-filter: blur(24px) saturate(120%);
    -webkit-backdrop-filter: blur(24px) saturate(120%);
    width: 100%; max-width: 420px;
    padding: 3rem 2.8rem;
    position: relative;
    z-index: 2;
    box-shadow: 0 40px 100px rgba(0,0,0,0.85), inset 0 1px 0 rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 16px;
    animation: fadeInCard 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .login-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 16px 16px 0 0;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 2.2rem;
  }
  .login-logo-v {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem; font-weight: 400;
    color: var(--accent);
    margin: 0 auto 1.2rem;
    letter-spacing: 0.05em;
    display: inline-flex; align-items: center; justify-content: center;
    width: 70px; height: 70px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(197, 168, 128, 0.08), rgba(197, 168, 128, 0.01));
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
  }
  .login-logo-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem; letter-spacing: .08em;
    color: var(--text-primary); text-transform: none;
    display: block; margin-bottom: .4rem;
    font-weight: 500;
  }
  .login-logo-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: .8rem;
    color: var(--text-secondary);
    display: block;
    letter-spacing: 0.05em;
  }
  .ornament {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 2rem;
  }
  .ornament::before, .ornament::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, rgba(197,168,128,0), rgba(197,168,128,0.15), rgba(197,168,128,0));
  }
  .ornament::before { background: linear-gradient(to left, rgba(197,168,128,0.15), rgba(197,168,128,0)); }
  .ornament-diamond {
    width: 5px; height: 5px;
    background: var(--accent);
    transform: rotate(45deg);
    flex-shrink: 0;
    opacity: 0.7;
  }
  .form-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; font-weight: 400;
    color: var(--text-primary);
    text-align: center;
    margin-bottom: 1.8rem;
    letter-spacing: 0.02em;
  }
  .form-group { margin-bottom: 1.4rem; }
  label {
    display: block;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: .65rem; letter-spacing: .12em;
    color: var(--text-secondary); text-transform: uppercase;
    margin-bottom: .6rem;
    font-weight: 600;
  }
  input[type="email"], input[type="password"] {
    width: 100%;
    border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.02);
    padding: 13px 16px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: .95rem;
    color: var(--text-primary);
    outline: none;
    border-radius: 8px;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  input[type="email"]:focus, input[type="password"]:focus {
    border-color: var(--border-focus);
    background: rgba(255, 255, 255, 0.04);
    box-shadow: 0 0 0 3px rgba(197, 168, 128, 0.15);
  }
  .btn-login {
    width: 100%;
    background: var(--accent);
    color: var(--bg-main);
    border: none; cursor: pointer;
    padding: 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: .8rem; letter-spacing: .08em;
    text-transform: uppercase;
    font-weight: 600;
    border-radius: 8px;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    margin-top: .5rem;
    box-shadow: 0 4px 12px rgba(197, 168, 128, 0.2);
  }
  .btn-login:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(197, 168, 128, 0.35);
  }
  .btn-login:active {
    transform: translateY(0);
  }
  .btn-login:disabled {
    background: rgba(197,168,128,0.25);
    color: var(--text-muted);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }
  .error-msg {
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.2);
    color: #ef4444;
    padding: 12px 14px;
    font-size: .85rem;
    margin-top: 1rem;
    display: none;
    text-align: center;
    line-height: 1.5;
    border-radius: 8px;
  }
  .back-link {
    display: block; text-align: center;
    margin-top: 1.8rem;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: .65rem; letter-spacing: .08em;
    color: var(--text-secondary); text-decoration: none;
    text-transform: uppercase;
    transition: color .2s, transform .2s;
  }
  .back-link:hover {
    color: var(--white);
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(10,11,13,.2);
    border-top-color: var(--bg-main);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeInCard {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <div class="login-logo-v">M&SM</div>
    <span class="login-logo-name">Monteiro & Solos do Mar</span>
    <span class="login-logo-sub">Área Privada — Gestão de Processos</span>
  </div>

  <div class="ornament"><div class="ornament-diamond"></div></div>

  <p class="form-title">Acesso Restrito</p>

  <form id="login-form">
    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login" id="btn-submit">
      <span class="spinner" id="spinner"></span>
      Entrar
    </button>
    <div class="error-msg" id="error-msg"></div>
  </form>

  <a href="recuperar-senha.html" class="back-link" style="margin-top:.9rem; opacity:.75;">Esqueceu a senha?</a>

  <!-- Aponte para o domínio do site público -->
  <a href="https://vandressasolosdomar.com.br" class="back-link">← Voltar ao site</a>
</div>

<script>
  // ══════════════════════════════════════════════════════════
  // CONFIGURAÇÃO SUPABASE
  const SUPABASE_URL  = 'https://vabvayctriflbanhcfuy.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYnZheWN0cmlmbGJhbmhjZnV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MjQzODcsImV4cCI6MjA5NTMwMDM4N30.l7j77sVAP2ejulSrT-dgoKOTORyC67LG0fy0IumstM0';
  // ══════════════════════════════════════════════════════════

  const errDiv  = document.getElementById('error-msg');
  const btn     = document.getElementById('btn-submit');
  const spinner = document.getElementById('spinner');

  function showErr(msg) {
    errDiv.innerHTML = msg;
    errDiv.style.display = 'block';
    btn.disabled = false;
    spinner.style.display = 'none';
  }

  let sb;
  try {
    const { createClient } = supabase;
    sb = createClient(SUPABASE_URL, SUPABASE_ANON);
  } catch(e) {
    showErr('Erro ao conectar com o Supabase: ' + e.message);
    throw e;
  }

  // Se já estiver logado, vai direto pro painel
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'painel/index.html';
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    spinner.style.display = 'inline-block';
    errDiv.style.display  = 'none';

    try {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        const msgs = {
          'Invalid login credentials': 'E-mail ou senha incorretos.',
          'Email not confirmed':        '⚠️ E-mail ainda não confirmado.<br><small>No Supabase: <strong>Authentication → Settings</strong> → desative <em>"Enable email confirmations"</em>.</small>',
          'User not found':             'Usuário não encontrado.',
        };
        showErr(msgs[error.message] || ('Erro: ' + error.message));
      } else {
        window.location.href = 'painel/index.html';
      }
    } catch(e) {
      showErr('Erro de conexão: ' + e.message);
    }
  });
</script>
</body>
</html>
