<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Restrito · M&SM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --creme: #F5EFE4;
    --bege: #E8D9C0;
    --bege-medio: #D4BC96;
    --caramelo: #B8914A;
    --dourado: #C9993A;
    --dourado-escuro: #9A7230;
    --marrom: #5C3D1A;
    --texto: #3A2810;
    --texto-suave: #6B4F2A;
    --branco: #FDFAF5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Lato', sans-serif;
    background: var(--marrom);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9993A' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }
  .login-card {
    background: var(--creme);
    width: 100%; max-width: 420px;
    padding: 3rem 2.8rem;
    position: relative;
    z-index: 2;
    box-shadow: 0 32px 80px rgba(0,0,0,.35);
  }
  .login-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to right, var(--caramelo), var(--dourado), var(--caramelo));
  }
  .login-logo {
    text-align: center;
    margin-bottom: 2.4rem;
  }
  .login-logo-v {
    width: 52px; height: 52px;
    border: 1.5px solid var(--caramelo);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 1rem; font-weight: 600;
    color: var(--caramelo);
    margin: 0 auto 1rem;
    letter-spacing: .05em;
  }
  .login-logo-name {
    font-family: 'Cinzel', serif;
    font-size: .72rem; letter-spacing: .2em;
    color: var(--texto); text-transform: uppercase;
    display: block; margin-bottom: .3rem;
  }
  .login-logo-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: .9rem; font-style: italic;
    color: var(--texto-suave);
  }
  .ornament {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 2rem;
  }
  .ornament::before, .ornament::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(184,145,74,.3);
  }
  .ornament-diamond {
    width: 6px; height: 6px;
    background: var(--caramelo);
    transform: rotate(45deg);
    flex-shrink: 0;
  }
  .form-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem; font-weight: 400;
    color: var(--texto);
    text-align: center;
    margin-bottom: 1.8rem;
  }
  .form-group { margin-bottom: 1.2rem; }
  label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: .6rem; letter-spacing: .2em;
    color: var(--caramelo); text-transform: uppercase;
    margin-bottom: .5rem;
  }
  input[type="email"], input[type="password"] {
    width: 100%;
    border: 1px solid rgba(184,145,74,.35);
    background: var(--branco);
    padding: 12px 14px;
    font-family: 'Lato', sans-serif;
    font-size: .95rem;
    color: var(--texto);
    outline: none;
    transition: border-color .2s;
  }
  input[type="email"]:focus, input[type="password"]:focus { border-color: var(--caramelo); }
  .btn-login {
    width: 100%;
    background: var(--caramelo);
    color: var(--branco);
    border: none; cursor: pointer;
    padding: 13px;
    font-family: 'Cinzel', serif;
    font-size: .72rem; letter-spacing: .2em;
    text-transform: uppercase;
    transition: background .25s;
    margin-top: .5rem;
  }
  .btn-login:hover { background: var(--dourado-escuro); }
  .btn-login:disabled { background: var(--bege-medio); cursor: not-allowed; }
  .error-msg {
    background: rgba(220,50,50,.1);
    border: 1px solid rgba(220,50,50,.3);
    color: #c0392b;
    padding: 10px 14px;
    font-size: .85rem;
    margin-top: 1rem;
    display: none;
    text-align: center;
    line-height: 1.5;
  }
  .back-link {
    display: block; text-align: center;
    margin-top: 1.8rem;
    font-family: 'Cinzel', serif;
    font-size: .58rem; letter-spacing: .15em;
    color: var(--texto-suave); text-decoration: none;
    text-transform: uppercase;
    transition: color .2s;
  }
  .back-link:hover { color: var(--caramelo); }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <div class="login-logo-v">M&SM</div>
    <span class="login-logo-name">Monteiro & Solos do Mar</span>
    <span class="login-logo-sub">Área Privada — Gestão</span>
  </div>

  <div class="ornament"><div class="ornament-diamond"></div></div>

  <p class="form-title">Acesso Restrito</p>

  <form id="login-form">
    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login" id="btn-submit">
      <span class="spinner" id="spinner"></span>
      Entrar
    </button>
    <div class="error-msg" id="error-msg"></div>
  </form>

  <!-- Aponte para o domínio do site público -->
  <a href="https://vandressasolosdomar.com.br" class="back-link">← Voltar ao site</a>
</div>

<script>
  // ══════════════════════════════════════════════════════════
 
  const SUPABASE_URL  = 'https://vabvayctriflbanhcfuy.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYnZheWN0cmlmbGJhbmhjZnV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MjQzODcsImV4cCI6MjA5NTMwMDM4N30.l7j77sVAP2ejulSrT-dgoKOTORyC67LG0fy0IumstM0';
  // ══════════════════════════════════════════════════════════

  const errDiv  = document.getElementById('error-msg');
  const btn     = document.getElementById('btn-submit');
  const spinner = document.getElementById('spinner');

  function showErr(msg) {
    errDiv.innerHTML = msg;
    errDiv.style.display = 'block';
    btn.disabled = false;
    spinner.style.display = 'none';
  }

  let sb;
  try {
    const { createClient } = supabase;
    sb = createClient(SUPABASE_URL, SUPABASE_ANON);
  } catch(e) {
    showErr('Erro ao conectar com o Supabase: ' + e.message);
    throw e;
  }

  // Se já estiver logado, vai direto pro painel
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'painel/index.html';
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    spinner.style.display = 'inline-block';
    errDiv.style.display  = 'none';

    try {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        const msgs = {
          'Invalid login credentials': 'E-mail ou senha incorretos.',
          'Email not confirmed':        '⚠️ E-mail ainda não confirmado.<br><small>No Supabase: <strong>Authentication → Settings</strong> → desative <em>"Enable email confirmations"</em>.</small>',
          'User not found':             'Usuário não encontrado.',
        };
        showErr(msgs[error.message] || ('Erro: ' + error.message));
      } else {
        window.location.href = 'painel/index.html';
      }
    } catch(e) {
      showErr('Erro de conexão: ' + e.message);
    }
  });
</script>
</body>
</html>
