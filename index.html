<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3A2008">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="M&SM Adv">
<title>Acesso Restrito · M&SM Advocacia</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/x-icon" href="icons/favicon.ico">
<link rel="shortcut icon" type="image/x-icon" href="icons/favicon.ico">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --creme: #F5EFE4;
    --bege: #E8D9C0;
    --bege-medio: #D4BC96;
    --caramelo: #B8914A;
    --dourado: #C9993A;
    --dourado-escuro: #9A7230;
    --marrom: #5C3D1A;
    --texto: #3A2810;
    --texto-suave: #6B4F2A;
    --branco: #FDFAF5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Lato', sans-serif;
    background: radial-gradient(circle at center, #2e1e0d 0%, #0d0500 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9993A' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }
  .login-card {
    background: rgba(245, 239, 228, 0.82);
    backdrop-filter: blur(16px) saturate(120%);
    -webkit-backdrop-filter: blur(16px) saturate(120%);
    width: 100%; max-width: 420px;
    padding: 3rem 2.8rem;
    position: relative;
    z-index: 2;
    box-shadow: 0 24px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.4);
    border: 1px solid rgba(184,145,74,0.22);
    border-radius: 12px;
    animation: fadeInCard 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  .login-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(to right, var(--caramelo), var(--dourado), var(--caramelo));
    border-radius: 12px 12px 0 0;
  }
  .login-logo {
    text-align: center;
    margin-bottom: 2.4rem;
  }
  .login-logo-v {
    width: 58px; height: 58px;
    border: 1.5px solid var(--caramelo);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 1rem; font-weight: 600;
    color: var(--caramelo);
    margin: 0 auto 1.2rem;
    letter-spacing: .05em;
    background: rgba(184, 145, 74, 0.05);
    box-shadow: 0 4px 12px rgba(184, 145, 74, 0.1);
  }
  .login-logo-name {
    font-family: 'Cinzel', serif;
    font-size: .75rem; letter-spacing: .2em;
    color: var(--texto); text-transform: uppercase;
    display: block; margin-bottom: .4rem;
  }
  .login-logo-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: .95rem; font-style: italic;
    color: var(--texto-suave);
  }
  .ornament {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 2rem;
  }
  .ornament::before, .ornament::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, rgba(184,145,74,0), rgba(184,145,74,0.3), rgba(184,145,74,0));
  }
  .ornament::before { background: linear-gradient(to left, rgba(184,145,74,0.3), rgba(184,145,74,0)); }
  .ornament-diamond {
    width: 6px; height: 6px;
    background: var(--caramelo);
    transform: rotate(45deg);
    flex-shrink: 0;
  }
  .form-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.45rem; font-weight: 400;
    color: var(--texto);
    text-align: center;
    margin-bottom: 1.8rem;
    letter-spacing: 0.02em;
  }
  .form-group { margin-bottom: 1.4rem; }
  label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: .65rem; letter-spacing: .2em;
    color: var(--caramelo); text-transform: uppercase;
    margin-bottom: .6rem;
  }
  input[type="email"], input[type="password"] {
    width: 100%;
    border: 1px solid rgba(184,145,74,0.3);
    background: rgba(253, 250, 245, 0.75);
    padding: 13px 16px;
    font-family: 'Lato', sans-serif;
    font-size: .95rem;
    color: var(--texto);
    outline: none;
    border-radius: 6px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  }
  input[type="email"]:focus, input[type="password"]:focus {
    border-color: var(--caramelo);
    background: var(--branco);
    box-shadow: 0 0 0 3px rgba(184, 145, 74, 0.15);
  }
  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, var(--caramelo), var(--dourado-escuro));
    color: var(--branco);
    border: none; cursor: pointer;
    padding: 14px;
    font-family: 'Cinzel', serif;
    font-size: .75rem; letter-spacing: .2em;
    text-transform: uppercase;
    border-radius: 6px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    margin-top: .5rem;
    box-shadow: 0 4px 12px rgba(184, 145, 74, 0.2);
  }
  .btn-login:hover {
    background: linear-gradient(135deg, var(--dourado), var(--caramelo));
    transform: translateY(-1.5px);
    box-shadow: 0 6px 20px rgba(184, 145, 74, 0.35);
  }
  .btn-login:active {
    transform: translateY(0);
  }
  .btn-login:disabled {
    background: var(--bege-medio);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }
  .error-msg {
    background: rgba(220,50,50,.08);
    border: 1px solid rgba(220,50,50,.25);
    color: #c0392b;
    padding: 12px 14px;
    font-size: .85rem;
    margin-top: 1rem;
    display: none;
    text-align: center;
    line-height: 1.5;
    border-radius: 6px;
  }
  .back-link {
    display: block; text-align: center;
    margin-top: 1.8rem;
    font-family: 'Cinzel', serif;
    font-size: .6rem; letter-spacing: .15em;
    color: var(--texto-suave); text-decoration: none;
    text-transform: uppercase;
    transition: color .2s, transform .2s;
  }
  .back-link:hover {
    color: var(--caramelo);
    transform: translateY(-0.5px);
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeInCard {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <div class="login-logo-v">M&SM</div>
    <span class="login-logo-name">Monteiro & Solos do Mar</span>
    <span class="login-logo-sub">Área Privada — Gestão de Processos</span>
  </div>

  <div class="ornament"><div class="ornament-diamond"></div></div>

  <p class="form-title">Acesso Restrito</p>

  <form id="login-form">
    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login" id="btn-submit">
      <span class="spinner" id="spinner"></span>
      Entrar
    </button>
    <div class="error-msg" id="error-msg"></div>
  </form>

  <a href="recuperar-senha.html" class="back-link" style="margin-top:.9rem; opacity:.75;">Esqueceu a senha?</a>

  <!-- Aponte para o domínio do site público -->
  <a href="https://vandressasolosdomar.com.br" class="back-link">← Voltar ao site</a>
</div>

<script>
  // ══════════════════════════════════════════════════════════
  // CONFIGURAÇÃO SUPABASE
  const SUPABASE_URL  = 'https://vabvayctriflbanhcfuy.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZhYnZheWN0cmlmbGJhbmhjZnV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MjQzODcsImV4cCI6MjA5NTMwMDM4N30.l7j77sVAP2ejulSrT-dgoKOTORyC67LG0fy0IumstM0';
  // ══════════════════════════════════════════════════════════

  const errDiv  = document.getElementById('error-msg');
  const btn     = document.getElementById('btn-submit');
  const spinner = document.getElementById('spinner');

  function showErr(msg) {
    errDiv.innerHTML = msg;
    errDiv.style.display = 'block';
    btn.disabled = false;
    spinner.style.display = 'none';
  }

  let sb;
  try {
    const { createClient } = supabase;
    sb = createClient(SUPABASE_URL, SUPABASE_ANON);
  } catch(e) {
    showErr('Erro ao conectar com o Supabase: ' + e.message);
    throw e;
  }

  // Se já estiver logado, vai direto pro painel
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'painel/index.html';
  });

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    btn.disabled = true;
    spinner.style.display = 'inline-block';
    errDiv.style.display  = 'none';

    try {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        const msgs = {
          'Invalid login credentials': 'E-mail ou senha incorretos.',
          'Email not confirmed':        '⚠️ E-mail ainda não confirmado.<br><small>No Supabase: <strong>Authentication → Settings</strong> → desative <em>"Enable email confirmations"</em>.</small>',
          'User not found':             'Usuário não encontrado.',
        };
        showErr(msgs[error.message] || ('Erro: ' + error.message));
      } else {
        window.location.href = 'painel/index.html';
      }
    } catch(e) {
      showErr('Erro de conexão: ' + e.message);
    }
  });
</script>
</body>
</html>
